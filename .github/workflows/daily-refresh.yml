name: Daily Data Refresh

on:
  schedule:
    # 7 AM UTC = 8 AM CET, after day-ahead prices are published
    - cron: "0 7 * * *"
  workflow_dispatch: # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Cache raw data files
        uses: actions/cache@v4
        with:
          path: data/raw
          key: raw-data-${{ github.run_number }}
          restore-keys: raw-data-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily data refresh
        env:
          FROST_CLIENT_ID: ${{ secrets.FROST_CLIENT_ID }}
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          COMMODITY_API_KEY: ${{ secrets.COMMODITY_API_KEY }}
        run: python scripts/daily_refresh.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
